<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>Menuva — View Dish (Case 3: steady camera preview)</title>

  <!--
    CASE 3 — "Pseudo-AR" steady viewer.
    Layer 1 (back): live camera feed (<video>).
    Layer 2 (top):  <model-viewer> with a TRANSPARENT background, so the dish
                    floats over the camera. It is screen-anchored (NOT world-
                    tracked) → it cannot drift. Touch-drag rotates it.
    Pinned model-viewer 4.3.1 from jsDelivr.
  -->
  <script type="module"
    src="https://cdn.jsdelivr.net/npm/@google/model-viewer@4.3.1/dist/model-viewer.min.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #000;
      overflow: hidden;
      overscroll-behavior: none;
    }

    /* ── Layer 0: fallback backdrop (shown if camera is unavailable) ── */
    #backdrop {
      position: fixed; inset: 0; z-index: 0;
      background: radial-gradient(120% 120% at 50% 20%, #2a2118 0%, #0c0a08 70%);
    }

    /* ── Layer 1: live camera feed ── */
    #camera {
      position: fixed; inset: 0; z-index: 1;
      width: 100%; height: 100%;
      object-fit: cover;
      opacity: 0;                         /* revealed once the stream is live */
      transition: opacity 0.5s ease;
    }
    body.camera-on #camera { opacity: 1; }

    /* ── Layer 2: the dish ── */
    #dish {
      position: fixed; inset: 0; z-index: 2;
      width: 100%; height: 100%;
      background: transparent;
      --poster-color: transparent;
      /* let model-viewer own the touch gesture (rotate), don't scroll the page */
      touch-action: none;
    }

    /* ── Layer 10: overlay UI (non-interactive except buttons) ── */
    #ui {
      position: fixed; inset: 0; z-index: 10;
      pointer-events: none;
      display: flex; flex-direction: column; justify-content: space-between;
      padding: 1.25rem;
      padding-top: calc(1.25rem + env(safe-area-inset-top));
      padding-bottom: calc(1.25rem + env(safe-area-inset-bottom));
    }

    #topbar { display: flex; align-items: center; justify-content: space-between; }
    .logo { font-size: 1.2rem; font-weight: 700; color: #fff; letter-spacing: -0.01em; }
    .logo span { color: #D4843A; }
    .item-label {
      background: rgba(0,0,0,0.55); border: 1px solid rgba(212,132,58,0.4);
      border-radius: 100px; padding: 0.35rem 0.9rem; color: #D4843A;
      font-size: 0.72rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
    }

    /* "Drag to rotate" hint — fades out after first interaction */
    #hint {
      align-self: center;
      background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.12);
      border-radius: 100px; padding: 0.5rem 1rem; color: #fff;
      font-size: 0.78rem; font-weight: 600;
      display: flex; align-items: center; gap: 0.5rem;
      transition: opacity 0.4s ease;
    }
    #hint.gone { opacity: 0; }
    #hint .spin { animation: nudge 1.6s ease-in-out infinite; }
    @keyframes nudge { 0%,100% { transform: translateX(-4px); } 50% { transform: translateX(4px); } }

    /* Bottom dish card */
    #dish-card {
      background: rgba(0,0,0,0.72); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px; padding: 1rem 1.25rem;
      display: flex; align-items: center; justify-content: space-between; gap: 1rem;
    }
    .dish-info h3 { color: #fff; font-size: 1rem; font-weight: 700; }
    .dish-info p { color: rgba(255,255,255,0.5); font-size: 0.72rem; margin-top: 0.15rem; }
    .dish-price { color: #D4843A; font-size: 1.3rem; font-weight: 800; white-space: nowrap; }

    /* ── Layer 20: tap-to-start (camera needs a user gesture + permission) ── */
    #start {
      position: fixed; inset: 0; z-index: 20;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 1rem; text-align: center; padding: 2rem;
      background: radial-gradient(120% 120% at 50% 30%, #1c1611 0%, #000 75%);
      transition: opacity 0.4s ease;
    }
    #start.gone { opacity: 0; pointer-events: none; }
    #start h1 { color: #fff; font-size: 1.5rem; font-weight: 800; }
    #start h1 span { color: #D4843A; }
    #start p { color: rgba(255,255,255,0.55); font-size: 0.85rem; max-width: 17rem; }
    #start button {
      margin-top: 0.5rem; border: none; cursor: pointer;
      background: #D4843A; color: #1a120a; font-weight: 800; font-size: 0.95rem;
      padding: 0.85rem 1.6rem; border-radius: 100px;
    }

    /* Small toast (e.g. camera denied → fell back to plain preview) */
    #toast {
      position: fixed; left: 50%; bottom: calc(6.5rem + env(safe-area-inset-bottom));
      transform: translateX(-50%); z-index: 15;
      background: rgba(0,0,0,0.8); border: 1px solid rgba(212,132,58,0.35);
      color: #fff; font-size: 0.74rem; padding: 0.5rem 0.9rem; border-radius: 100px;
      opacity: 0; transition: opacity 0.4s ease; pointer-events: none; max-width: 80%;
      text-align: center;
    }
    #toast.show { opacity: 1; }
  </style>
</head>
<body>

  <div id="backdrop"></div>

  <video id="camera" autoplay playsinline muted webkit-playsinline></video>

  <model-viewer
    id="dish"
    src="burger.glb"
    alt="Classic Smash Burger"
    camera-controls
    disable-zoom
    disable-pan
    auto-rotate
    auto-rotate-delay="3000"
    rotation-per-second="16deg"
    interaction-prompt="none"
    shadow-intensity="0"
    environment-image="neutral"
    exposure="1.0"
    camera-orbit="0deg 80deg 105%"
    min-camera-orbit="auto 20deg auto"
    max-camera-orbit="auto 100deg auto"
  ></model-viewer>

  <div id="ui">
    <div id="topbar">
      <div class="logo">menu<span>va</span></div>
      <div class="item-label">Live Preview</div>
    </div>

    <div id="hint"><span class="spin">↔</span> Drag to rotate the dish</div>

    <div id="dish-card">
      <div class="dish-info">
        <h3>Classic Smash Burger</h3>
        <p>Double patty · Cheddar · Pickles · Special sauce</p>
      </div>
      <div class="dish-price">PKR 1,450</div>
    </div>
  </div>

  <div id="toast"></div>

  <div id="start">
    <h1>See it on your <span>table</span></h1>
    <p>Point your camera at the table, then drag to spin the dish and check the portion.</p>
    <button id="start-btn">Start preview</button>
  </div>

  <script>
    const body    = document.body;
    const video   = document.getElementById('camera');
    const dish    = document.getElementById('dish');
    const startEl = document.getElementById('start');
    const startBtn= document.getElementById('start-btn');
    const hint    = document.getElementById('hint');
    const toast   = document.getElementById('toast');

    function showToast(msg) {
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 4200);
    }

    // Hide the "drag to rotate" hint once the user actually rotates.
    dish.addEventListener('camera-change', (e) => {
      if (e.detail.source === 'user-interaction') hint.classList.add('gone');
    });

    async function startCamera() {
      startEl.classList.add('gone');
      try {
        // Rear camera preferred; fall back to any camera.
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: { ideal: 'environment' } },
          audio: false
        });
        video.srcObject = stream;
        await video.play().catch(() => {});
        body.classList.add('camera-on');
      } catch (err) {
        // Permission denied, no camera, or insecure (http) context.
        // Degrade gracefully to a clean studio backdrop (Case 1 look).
        console.warn('Camera unavailable, using fallback backdrop:', err.name);
        showToast('Camera off — showing dish on a plain background.');
      }
    }

    startBtn.addEventListener('click', startCamera);
  </script>

</body>
</html>
